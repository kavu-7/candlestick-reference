<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>The Trading Desk — Candlestick Pattern Reference</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:#080808;
  background-image:radial-gradient(ellipse at 20% 0%,rgba(201,168,64,.05) 0%,transparent 60%),
                   radial-gradient(ellipse at 80% 100%,rgba(201,168,64,.03) 0%,transparent 60%);
  color:#d8d4c8;
  font-family:'Inter',sans-serif;
  min-height:100vh;
  line-height:1.5
}

/* ── HEADER ── */
header{
  padding:1.1rem 2rem .9rem;
  background:rgba(8,8,8,.97);
  border-bottom:1px solid #1e1c17;
  position:sticky;top:0;z-index:200;
  backdrop-filter:blur(20px)
}
.hrow{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:.8rem}
.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;font-weight:700;
  color:#c9a840;letter-spacing:.08em;
  text-shadow:0 0 40px rgba(201,168,64,.3);
  white-space:nowrap
}
.logo sub{
  font-size:9px;font-family:'DM Mono',monospace;
  color:#9a8e70;letter-spacing:.14em;
  vertical-align:middle;margin-left:5px
}
.search-wrap{flex:1;max-width:300px;position:relative}
.search-wrap svg{
  position:absolute;left:11px;top:50%;transform:translateY(-50%);
  width:13px;height:13px;stroke:#5a5442;fill:none;stroke-width:2;stroke-linecap:round
}
#search{
  width:100%;background:#111008;
  border:1px solid #2a2618;color:#e8e4d8;
  font-family:'DM Mono',monospace;font-size:12px;
  padding:8px 10px 8px 32px;border-radius:4px;outline:none;
  transition:border-color .2s,box-shadow .2s;letter-spacing:.02em
}
#search:focus{border-color:#c9a840;box-shadow:0 0 0 3px rgba(201,168,64,.08)}
#search::placeholder{color:#3a3628}
.ctrl{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.sp{width:1px;height:16px;background:#1e1c17;flex-shrink:0;margin:0 3px}
.btn{
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;
  padding:5px 14px;border-radius:3px;
  border:1px solid #222018;background:transparent;
  color:#9a9070;cursor:pointer;transition:all .15s;white-space:nowrap
}
.btn:hover{color:#d8d4c8;border-color:#4a4436}
.btn.on-all{background:rgba(201,168,64,.08);border-color:rgba(201,168,64,.35);color:#c9a840}
.btn.on-bull{background:rgba(52,168,83,.08);border-color:rgba(52,168,83,.3);color:#34a853}
.btn.on-bear{background:rgba(220,53,69,.08);border-color:rgba(220,53,69,.3);color:#dc3545}
.btn.on-neut{background:rgba(184,147,62,.07);border-color:rgba(184,147,62,.28);color:#c9a840}
.btn.on-sort{background:rgba(100,130,200,.08);border-color:rgba(100,130,200,.3);color:#7a9de8}

/* ── STAT BAR ── */
#statbar{
  display:flex;gap:1.5rem;align-items:center;flex-wrap:wrap;
  padding:.5rem 2rem;border-bottom:1px solid #141210;
  background:#060606;font-size:11px
}
.si{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;letter-spacing:.05em;color:#b0a888}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.si-count{margin-left:auto;color:#6a6050;font-family:'DM Mono',monospace;font-size:10px}

/* ── GRID — 4 columns max ── */
.gw{padding:1.4rem 2rem 3rem}
#grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px
}
@media(max-width:1100px){#grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:780px){#grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){#grid{grid-template-columns:1fr}}

/* ── FLIP CARD ── */
.card{height:430px;perspective:1200px;cursor:pointer}
.ci{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1)}
.card.flipped .ci{transform:rotateY(180deg)}
.cf{
  position:absolute;inset:0;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:10px;background:#0e0d0a;
  display:flex;flex-direction:column;overflow:hidden
}
.cb{transform:rotateY(180deg);overflow-y:auto;padding:14px 15px 10px;display:block}

.cbull{border:1px solid #1e2e1e;border-top:3px solid #34a853}
.cbear{border:1px solid #2e1a1a;border-top:3px solid #dc3545}
.cneut{border:1px solid #2a2618;border-top:3px solid #c9a840}
.card:hover .cbull{box-shadow:0 6px 36px rgba(52,168,83,.12),0 0 0 1px rgba(52,168,83,.14)}
.card:hover .cbear{box-shadow:0 6px 36px rgba(220,53,69,.12),0 0 0 1px rgba(220,53,69,.14)}
.card:hover .cneut{box-shadow:0 6px 36px rgba(201,168,64,.1),0 0 0 1px rgba(201,168,64,.12)}

/* ── FRONT ── */
.ftop{padding:14px 15px 6px;flex-shrink:0}
.fmid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 14px;gap:10px}
.fbot{padding:9px 15px 13px;border-top:1px solid #181610;flex-shrink:0}

.bgs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.bg{
  font-size:9px;font-family:'DM Mono',monospace;letter-spacing:.1em;
  padding:3px 9px;border-radius:2px;line-height:1.6;border:1px solid transparent
}
.bgb{background:rgba(52,168,83,.09);color:#5fce7f;border-color:rgba(52,168,83,.25)}
.bgr{background:rgba(220,53,69,.09);color:#f06472;border-color:rgba(220,53,69,.25)}
.bgn{background:rgba(201,168,64,.08);color:#d4ad4a;border-color:rgba(201,168,64,.25)}
.bgs1{background:rgba(100,130,200,.07);color:#7a9de8;border-color:rgba(100,130,200,.22)}
.bgm{background:rgba(168,100,200,.07);color:#c07ae8;border-color:rgba(168,100,200,.22)}

.cname{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:600;
  color:#f0ece0;letter-spacing:.02em;line-height:1.2
}
.prior{font-size:10px;color:#9a9070;margin-top:3px;letter-spacing:.04em;font-family:'DM Mono',monospace}

.ohlc{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;width:100%}
.oc{background:#0a0908;border:1px solid #1e1c17;border-radius:4px;padding:5px 3px;text-align:center}
.ol{font-size:8px;color:#7a7060;display:block;margin-bottom:2px;letter-spacing:.1em;font-family:'DM Mono',monospace}
.ov{font-size:11px;font-weight:500;color:#d8d4c8;font-family:'DM Mono',monospace}

.rrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.rlbl{font-size:10px;color:#8a7e60;letter-spacing:.06em;font-family:'DM Mono',monospace}
.rpct{font-family:'DM Mono',monospace;font-size:14px;font-weight:500}
.rbar{height:2px;background:#141210;border-radius:1px;overflow:hidden;margin-bottom:6px}
.rbar-fill{height:100%;border-radius:1px}
.fhint{font-size:9px;color:#6a6050;text-align:right;letter-spacing:.08em;font-family:'DM Mono',monospace;font-style:italic}

/* ── BACK ── */
.blbl{
  font-size:9px;font-family:'DM Mono',monospace;letter-spacing:.12em;
  color:#c9a840;margin:10px 0 5px;text-transform:uppercase
}
.blbl:first-child{margin-top:0}
.clist{list-style:none}
.clist li{
  font-size:10.5px;line-height:1.6;color:#c0bc9e;
  padding:2px 0 2px 14px;position:relative
}
.clist li::before{content:"—";position:absolute;left:0;top:2px;font-size:9px;color:#6a6040}

.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin:5px 0}
.sc{border-radius:5px;padding:9px 7px;text-align:center}
.sc-e{background:#0e120e;border:1px solid #223022}
.sc-s{background:#120e0e;border:1px solid #301a1a}
.sc-t{background:#120f08;border:1px solid #2e2410}
.sclbl{font-size:8px;font-family:'DM Mono',monospace;letter-spacing:.1em;display:block;margin-bottom:4px}
.sc-e .sclbl{color:#5fce7f}
.sc-s .sclbl{color:#f06472}
.sc-t .sclbl{color:#d4ad4a}
.scval{font-size:10px;line-height:1.5;color:#e8e4d8;font-weight:500;font-family:'DM Mono',monospace}

.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin:5px 0}
.rc{border-radius:5px;padding:9px 10px}
.rct{background:#0a100a;border:1px solid #1e2e1e}
.rca{background:#0c0c12;border:1px solid #1e1e2e}
.rclbl{font-size:8.5px;font-family:'DM Mono',monospace;font-weight:500;display:block;margin-bottom:4px;letter-spacing:.07em}
.rct .rclbl{color:#5fce7f}
.rca .rclbl{color:#7a9de8}
.rcval{font-size:10px;line-height:1.5;color:#c0bc9e}

.tfs{display:flex;gap:4px;flex-wrap:wrap;margin:5px 0}
.tfb{
  font-size:9px;padding:3px 10px;border-radius:2px;font-family:'DM Mono',monospace;
  background:#0e0d0a;border:1px solid #2a2618;color:#b0a278;letter-spacing:.06em
}

/* ── CALCULATOR ── */
.calc{
  background:#0a0908;border:1px solid #222018;
  border-radius:6px;padding:11px 12px;margin-top:8px
}
.calc-hdr{
  font-size:9px;font-family:'DM Mono',monospace;color:#c9a840;
  letter-spacing:.12em;margin-bottom:8px;
  display:flex;align-items:center;gap:8px;text-transform:uppercase
}
.calc-hdr::before,.calc-hdr::after{content:"";flex:1;height:1px;background:#222018}
.calc-note{
  font-size:10px;color:#b0a888;margin-bottom:10px;
  line-height:1.7;font-family:'DM Mono',monospace;
  background:#0c0b08;border:1px solid #2a2618;
  border-radius:4px;padding:8px 10px
}
.inp-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.inp-wrap{display:flex;flex-direction:column;gap:3px}
.inp-wrap label{font-size:9px;color:#9a9070;font-family:'DM Mono',monospace;letter-spacing:.1em}
.cinp{
  background:#0c0b08;border:1px solid #222018;
  color:#f0ece0;font-family:'DM Mono',monospace;font-size:12px;
  padding:7px 9px;border-radius:4px;outline:none;
  transition:border-color .15s;width:100%
}
.cinp:focus{border-color:#c9a840;box-shadow:0 0 0 2px rgba(201,168,64,.08)}
.cinp::placeholder{color:#2e2c20;font-size:10px}
.cbtn{
  width:100%;margin-top:4px;
  background:rgba(201,168,64,.09);border:1px solid rgba(201,168,64,.3);
  color:#d4b84a;font-family:'DM Mono',monospace;font-size:10px;
  padding:8px;border-radius:4px;cursor:pointer;letter-spacing:.12em;
  transition:all .15s;text-transform:uppercase;font-weight:500
}
.cbtn:hover{background:rgba(201,168,64,.15);box-shadow:0 0 16px rgba(201,168,64,.1)}

/* ── RESULTS ── */
.cres{margin-top:10px;display:none;flex-direction:column;gap:4px}
.res-section{margin-bottom:6px}
.res-section-lbl{
  font-size:9px;font-family:'DM Mono',monospace;
  letter-spacing:.12em;color:#8a7e62;
  padding-bottom:4px;margin-bottom:4px;
  border-bottom:1px solid #222018;text-transform:uppercase
}
.res-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 10px;border-radius:4px;margin-bottom:3px
}
.res-row.entry-row{background:#0e120c;border:1px solid #283020}
.res-row.sl-row{background:#120c0c;border:1px solid #301818}
.res-row.t1-row{background:#0d1009;border:1px solid #1e2814}
.res-row.t2-row{background:#0e1209;border:1px solid #223016}
.res-row.t3-row{background:#0f1209;border:1px solid #263418}
.res-row.t4-row{background:#101309;border:1px solid #2a381a}
.res-left{display:flex;flex-direction:column;gap:2px}
.res-tag{font-size:9px;font-family:'DM Mono',monospace;letter-spacing:.08em;font-weight:500}
.entry-row .res-tag{color:#9ad890}
.sl-row .res-tag{color:#f09898}
.t1-row .res-tag,.t2-row .res-tag,.t3-row .res-tag,.t4-row .res-tag{color:#a0c090}
.res-desc{font-size:9px;color:#8a8068;font-family:'DM Mono',monospace}
.res-val{font-size:16px;font-weight:600;font-family:'DM Mono',monospace;text-align:right}
.entry-row .res-val{color:#c8f0a0}
.sl-row .res-val{color:#ff9090}
.t1-row .res-val{color:#90d890}
.t2-row .res-val{color:#a0e490}
.t3-row .res-val{color:#b0ee90}
.t4-row .res-val{color:#c0f890}
.res-rr{font-size:9px;color:#6a6450;font-family:'DM Mono',monospace;text-align:right;margin-top:1px}

.bkhint{
  font-size:9px;color:#6a6050;text-align:center;
  margin-top:10px;padding-top:8px;border-top:1px solid #1e1c14;
  letter-spacing:.08em;font-family:'DM Mono',monospace
}
.nores{
  grid-column:1/-1;text-align:center;
  padding:5rem;color:#3a3428;font-size:16px;
  font-family:'Cormorant Garamond',serif;letter-spacing:.04em
}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#222018;border-radius:2px}

/* ── FOOTER ── */
footer{
  text-align:center;padding:1.8rem 1rem;
  font-size:11px;color:#7a7060;
  border-top:1px solid #1a1810;
  letter-spacing:.05em;line-height:2.2;
  font-family:'DM Mono',monospace
}
footer span{color:#c9a840}
footer a{color:#7a9de8;text-decoration:none}
footer a:hover{color:#a0bdf0}
</style>

var GR="#34a853",RD="#dc3545",GY="#8a8672";

function buildSVG(cs){
  var n=cs.length;
  var cw=n===1?50:n===2?50:36,gap=n===1?0:10;
  var sh=88,pd=7,W=n*cw+(n-1)*gap;
  var gH=Math.max.apply(null,cs.map(function(c){return c[1]}));
  var gL=Math.min.apply(null,cs.map(function(c){return c[2]}));
  var rng=gH-gL||1;
  function y(v){return(pd+(1-(v-gL)/rng)*(sh-2*pd)).toFixed(2)}
  var s="";
  cs.forEach(function(c,i){
    var x0=i*(cw+gap),cx=(x0+cw/2).toFixed(1);
    var bw=(cw*.54).toFixed(1),bx=(x0+cw/2-cw*.27).toFixed(1);
    var yH=y(c[1]),yL=y(c[2]),yO=y(c[0]),yC=y(c[3]);
    var bt=Math.min(+yO,+yC).toFixed(2);
    var bh=Math.max(3,Math.abs(+yO-+yC)).toFixed(2);
    var col=c[4]==="b"?GR:c[4]==="r"?RD:GY;
    s+="<line x1='"+cx+"' y1='"+yH+"' x2='"+cx+"' y2='"+yL+"' stroke='"+col+"' stroke-width='1.6' stroke-linecap='round'/>";
    s+="<rect x='"+bx+"' y='"+bt+"' width='"+bw+"' height='"+bh+"' fill='"+col+"' rx='1.5'/>";
  });
  return "<svg viewBox='0 0 "+W+" "+sh+"' style='height:"+sh+"px;width:auto;display:block'>"+s+"</svg>";
}

var catF="all",dirF="all",srtD=false;
function relColor(r){return r>=70?"#5fce7f":r>=57?"#d4ad4a":"#f06472"}

function mkCard(p){
  var dc=p.dir==="b"?"bull":p.dir==="r"?"bear":"neut";
  var dlab=p.dir==="b"?"BULLISH":p.dir==="r"?"BEARISH":"NEUTRAL";
  var cbg=p.dir==="b"?"bgb":p.dir==="r"?"bgr":"bgn";
  var catbg=p.cat==="single"?"bgs1":"bgm";
  var catlab=p.cat==="single"?"SINGLE":"MULTI";
  var rc=relColor(p.rel);
  var ohlcH=p.ohlc.map(function(o){return "<div class='oc'><span class='ol'>"+o[0]+"</span><span class='ov'>&#8377;"+o[1]+"</span></div>";}).join("");
  var condsH=p.conds.map(function(c){return "<li>"+c+"</li>";}).join("");
  var tfH=p.tf.map(function(t){return "<span class='tfb'>"+t+"</span>";}).join("");
  var rowCls=["t1-row","t2-row","t3-row","t4-row"];
  var tgtRowsH=p.tgtLabels.map(function(lbl,i){
    var rr=p.tgtRR[i];
    return "<div class='res-row "+rowCls[i]+"'>"+
      "<div class='res-left'><span class='res-tag'>"+lbl+"</span><span class='res-desc'>1:"+rr+" R:R &nbsp;|&nbsp; gain: <span id='tg-desc-"+p.id+"-"+i+"'>—</span></span></div>"+
      "<div><span class='res-val' id='tv-"+p.id+"-"+i+"'>—</span></div>"+
    "</div>";
  }).join("");

  var front="<div class='cf c"+dc+"'>"+
    "<div class='ftop'>"+
    "<div class='bgs'><span class='bg "+cbg+"'>"+dlab+"</span><span class='bg "+catbg+"'>"+catlab+"</span></div>"+
    "<div class='cname'>"+p.n+"</div>"+
    "<div class='prior'>Prior: "+p.prior+"</div>"+
    "</div>"+
    "<div class='fmid'>"+buildSVG(p.cs)+"<div class='ohlc'>"+ohlcH+"</div></div>"+
    "<div class='fbot'>"+
    "<div class='rrow'><span class='rlbl'>RELIABILITY</span><span class='rpct' style='color:"+rc+"'>"+p.rel+"%</span></div>"+
    "<div class='rbar'><div class='rbar-fill' style='width:"+p.rel+"%;background:"+rc+"'></div></div>"+
    "<div class='fhint'>tap to reveal full trade setup &rsaquo;</div>"+
    "</div></div>";

  var back="<div class='cf cb c"+dc+"'>"+
    "<div class='blbl'>Conditions to confirm</div>"+
    "<ul class='clist'>"+condsH+"</ul>"+
    "<div class='blbl'>Trade setup</div>"+
    "<div class='sgrid'>"+
    "<div class='sc sc-e'><span class='sclbl'>ENTRY</span><span class='scval'>"+p.entry+"</span></div>"+
    "<div class='sc sc-s'><span class='sclbl'>STOP LOSS</span><span class='scval'>"+p.sl+"</span></div>"+
    "<div class='sc sc-t'><span class='sclbl'>TARGETS</span><span class='scval'>"+p.tgt+"</span></div>"+
    "</div>"+
    "<div class='blbl'>Risk profile</div>"+
    "<div class='rgrid'>"+
    "<div class='rc rct'><span class='rclbl'>&#9650; Risk Taker</span><span class='rcval'>"+p.rt+"</span></div>"+
    "<div class='rc rca'><span class='rclbl'>&#9670; Risk Averse</span><span class='rcval'>"+p.ra+"</span></div>"+
    "</div>"+
    "<div class='blbl'>Best timeframe</div><div class='tfs'>"+tfH+"</div>"+
    "<div class='blbl'>Live Target Calculator</div>"+
    "<div class='calc no-flip'>"+
    "<div class='calc-hdr'>Enter this candle's OHLC values</div>"+
    "<div class='calc-note'>"+p.calcNote+"</div>"+
    "<div class='inp-row'>"+
    "<div class='inp-wrap'><label>OPEN</label><input class='cinp no-flip' type='number' id='ci-O-"+p.id+"' placeholder='0.00'></div>"+
    "<div class='inp-wrap'><label>HIGH</label><input class='cinp no-flip' type='number' id='ci-H-"+p.id+"' placeholder='0.00'></div>"+
    "<div class='inp-wrap'><label>LOW</label><input class='cinp no-flip' type='number' id='ci-L-"+p.id+"' placeholder='0.00'></div>"+
    "<div class='inp-wrap'><label>CLOSE</label><input class='cinp no-flip' type='number' id='ci-C-"+p.id+"' placeholder='0.00'></div>"+
    "</div>"+
    "<button class='cbtn no-flip' onclick='doCalc(event,\""+p.id+"\")'>CALCULATE STOP LOSS &amp; TARGETS</button>"+
    "<div class='cres' id='cres-"+p.id+"'>"+
    "<div class='res-section'>"+
    "<div class='res-section-lbl'>Your Trade</div>"+
    "<div class='res-row entry-row'><div class='res-left'><span class='res-tag'>ENTRY PRICE</span><span class='res-desc' id='en-desc-"+p.id+"'>—</span></div><span class='res-val' id='ev-"+p.id+"'>—</span></div>"+
    "<div class='res-row sl-row'><div class='res-left'><span class='res-tag'>STOP LOSS</span><span class='res-desc' id='sl-desc-"+p.id+"'>—</span></div><span class='res-val' id='slv-"+p.id+"'>—</span></div>"+
    "</div>"+
    "<div class='res-section'>"+
    "<div class='res-section-lbl'>Target Options</div>"+
    tgtRowsH+
    "</div></div></div>"+
    "<div class='bkhint'>&lsaquo; tap anywhere outside the calculator to flip back</div>"+
    "</div>";

  return "<div class='card' data-id='"+p.id+"' data-cat='"+p.cat+"' data-dir='"+p.dir+"'>"+
         "<div class='ci'>"+front+back+"</div></div>";
}

function doCalc(e,pid){
  e.stopPropagation();
  var p=P.find(function(x){return x.id===pid;});
  if(!p)return;
  var O=parseFloat(document.getElementById("ci-O-"+pid).value);
  var H=parseFloat(document.getElementById("ci-H-"+pid).value);
  var L=parseFloat(document.getElementById("ci-L-"+pid).value);
  var C=parseFloat(document.getElementById("ci-C-"+pid).value);
  if([O,H,L,C].some(isNaN)){alert("Please enter all 4 values (O, H, L, C)");return;}
  var entry=p.entrySrc==="C"?C:p.entrySrc==="H"?H:L;
  var sl=p.slSrc==="H"?H:L;
  var risk=Math.abs(entry-sl);
  if(risk<=0){alert("Entry and SL cannot be the same price.");return;}
  var res=document.getElementById("cres-"+pid);
  res.style.display="flex";
  document.getElementById("ev-"+pid).textContent="₹"+entry.toFixed(2);
  document.getElementById("en-desc-"+pid).textContent="from "+p.entrySrc+" &nbsp;|&nbsp; risk ₹"+risk.toFixed(2)+" ("+((risk/entry)*100).toFixed(2)+"%)";
  document.getElementById("slv-"+pid).textContent="₹"+sl.toFixed(2);
  document.getElementById("sl-desc-"+pid).textContent="from "+p.slSrc+" &nbsp;|&nbsp; distance ₹"+risk.toFixed(2);
  p.tgtRR.forEach(function(rr,i){
    var tgt=p.tgtDir===1?entry+risk*rr:entry-risk*rr;
    var gain=Math.abs(tgt-entry);
    document.getElementById("tv-"+pid+"-"+i).textContent="₹"+tgt.toFixed(2);
    document.getElementById("tg-desc-"+pid+"-"+i).textContent="₹"+gain.toFixed(2);
  });
}

function render(){
  var q=document.getElementById("search").value.toLowerCase().trim();
  var data=P.filter(function(p){
    return(catF==="all"||p.cat===catF)&&
           (dirF==="all"||p.dir===dirF)&&
           (!q||p.n.toLowerCase().includes(q)||p.prior.toLowerCase().includes(q));
  });
  if(srtD)data.sort(function(a,b){return b.rel-a.rel;});
  var bulls=data.filter(function(p){return p.dir==="b";}).length;
  var bears=data.filter(function(p){return p.dir==="r";}).length;
  var neuts=data.filter(function(p){return p.dir==="n";}).length;
  document.getElementById("statbar").innerHTML=
    "<span class='si'><span class='sdot' style='background:#34a853'></span>"+bulls+" bullish</span>"+
    "<span class='si'><span class='sdot' style='background:#dc3545'></span>"+bears+" bearish</span>"+
    "<span class='si'><span class='sdot' style='background:#c9a840'></span>"+neuts+" neutral</span>"+
    "<span class='si-count'>"+data.length+" / "+P.length+" patterns</span>";
  var g=document.getElementById("grid");
  if(!data.length){g.innerHTML="<div class='nores'>No patterns match.</div>";return;}
  g.innerHTML=data.map(mkCard).join("");
  g.querySelectorAll(".card").forEach(function(cd){
    cd.addEventListener("click",function(e){
      if(e.target.closest(".no-flip"))return;
      cd.classList.toggle("flipped");
    });
  });
  g.querySelectorAll(".cinp,.cbtn").forEach(function(el){
    el.addEventListener("click",function(e){e.stopPropagation();});
    if(el.tagName==="INPUT"){
      el.addEventListener("keydown",function(e){
        e.stopPropagation();
        if(e.key==="Enter"){var id=el.id.replace(/^ci-[OHLC]-/,"");doCalc(e,id);}
      });
    }
  });
}

document.getElementById("ctrl").addEventListener("click",function(e){
  var b=e.target.closest(".btn");
  if(!b||b.id==="srt")return;
  if(b.dataset.cat!==undefined){
    document.querySelectorAll("[data-cat]").forEach(function(x){x.className="btn";});
    b.className="btn on-all";catF=b.dataset.cat;
  }
  if(b.dataset.dir!==undefined){
    document.querySelectorAll("[data-dir]").forEach(function(x){x.className="btn";});
    var cls=b.dataset.dir==="b"?"on-bull":b.dataset.dir==="r"?"on-bear":b.dataset.dir==="n"?"on-neut":"on-all";
    b.className="btn "+cls;dirF=b.dataset.dir;
  }
  render();
});
document.getElementById("srt").addEventListener("click",function(){
  srtD=!srtD;
  this.textContent=srtD?"SORT BY RELIABILITY \u25B2":"SORT BY RELIABILITY \u25BC";
  this.className=srtD?"btn on-sort":"btn";
  render();
});
document.getElementById("search").addEventListener("input",render);
render();
</script>
</body>
</html>
